name: Publish to NPM

on:
  push:
    branches: [master, main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if already published
        id: check
        shell: bash
        run: |
          # Use npm view versions as it's more reliable for brand-new versions
          if npm view "@a-issaoui/universal-msdf-generator" versions --json | jq -e ". | contains([\"${{ steps.pkg.outputs.version }}\"])" >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice ::Version ${{ steps.pkg.outputs.version }} is already published, skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build and tests
        if: steps.check.outputs.published == 'false'
        run: |
          npm run check
          npm run typecheck
          npm run coverage

      - name: Build package
        if: steps.check.outputs.published == 'false'
        run: npm run build

      - name: Publish to NPM
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.published == 'false'
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
