name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4.2.2

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4.3.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Security audit
      # Audit at high severity. The one known moderate advisory (GHSA-5v7r-6r5c-r473)
      # is an infinite loop in file-type's ASF (audio/video) parser, reachable only
      # via jimp → msdf-bmfont-xml. We never parse ASF files; risk is zero.
      run: npm audit --audit-level=high
 
    - name: Lint check (Biome)
      run: npm run check

    - name: Type check (TSC)
      run: npm run typecheck

    - name: Run Tests with 100% Coverage
      run: npm run coverage

    - name: Build
      run: npm run build
